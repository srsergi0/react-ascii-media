name: Build & Commit Lib

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Commit dist-lib
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist-lib -f
          git diff --staged --quiet || git commit -m "build: update dist-lib [skip ci]" && git push
